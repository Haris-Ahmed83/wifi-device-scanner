<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<title>WiFi Network Scanner</title>
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="/css/style.css">
<script src="https://unpkg.com/vis-network@9.1.9/dist/vis-network.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand">
    <span class="nav-icon">&#x1F6E1;</span>
    <span class="nav-title">WiFi Scanner</span>
    <span id="ws-status" class="ws-indicator">&#9679; Connecting...</span>
  </div>
  <div class="nav-info">
    <span id="nav-hostname"></span>
    <span id="nav-ip"></span>
    <span id="nav-scan-time" class="scan-time"></span>
  </div>
  <div class="nav-actions">
    <button id="btn-scan" class="btn btn-primary" onclick="triggerScan()">&#x1F50D; Scan Now</button>
  </div>
</nav>

<main class="container">
  <div class="tabs">
    <button class="tab active" data-tab="devices" onclick="switchTab('devices')">&#x1F4CB; Devices</button>
    <button class="tab" data-tab="topology" onclick="switchTab('topology')">&#x1F5FA; Topology</button>
    <button class="tab" data-tab="history" onclick="switchTab('history')">&#x1F4CA; History</button>
  </div>

  <section id="tab-devices" class="tab-content active">
    <div class="stats-bar" id="stats-bar">
      <div class="stat"><span class="stat-num" id="stat-total">0</span><span class="stat-label">Total</span></div>
      <div class="stat" id="stat-types"></div>
    </div>
    <div class="device-grid" id="device-grid">
      <div class="loading">&#x23F3; Waiting for scan...</div>
    </div>
  </section>

  <section id="tab-topology" class="tab-content">
    <div id="topology-container"></div>
  </section>

  <section id="tab-history" class="tab-content">
    <div class="chart-wrapper">
      <canvas id="history-chart"></canvas>
    </div>
  </section>
</main>

<script src="/js/api.js"></script>
<script src="/js/ws.js"></script>
<script src="/js/app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
</html>
